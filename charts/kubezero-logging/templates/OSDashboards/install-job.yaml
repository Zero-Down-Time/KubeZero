{{- if .Values.osdashboards.enabled }}
# Installs AWS Centralized Logging with OpenSearch (CLO) index templates and
# saved-object dashboards. The per-service assets are generated by
# scipts/sync-osd-dashboards.sh into ConfigMaps named osdashboards-<svc>;
# this Job mounts them, decompresses on the pod, and applies them via the
# OpenSearch and OpenSearch Dashboards APIs. Runs as a Helm post-install/
# post-upgrade hook so it fires after the data plane (Vector, OS, OSD) is up.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: osdashboards-install
  labels:
    app.kubernetes.io/name: osdashboards
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  install.sh: |-
    #!/bin/sh
    set -eu

    wait_for() {
      url=$1; auth=$2; name=$3
      echo "waiting for $name at $url ..."
      i=0
      until curl -sSfk -u "$auth" "$url" >/dev/null 2>&1; do
        i=$((i + 1))
        if [ $i -ge 60 ]; then
          echo "timeout waiting for $name" >&2
          exit 1
        fi
        sleep 5
      done
    }

    wait_for "$OPENSEARCH_ENDPOINT/_cluster/health" \
             "$OPENSEARCH_USER:$OPENSEARCH_PASSWORD" \
             OpenSearch
    wait_for "$OSD_ENDPOINT/api/status" \
             "$OSD_USER:$OSD_PASSWORD" \
             OpenSearch-Dashboards

    for svc in $SERVICES; do
      asset_dir=/assets/$svc
      if [ ! -d "$asset_dir" ]; then
        echo "skip $svc (assets not mounted)"
        continue
      fi

      if [ -f "$asset_dir/index_template.json.gz" ]; then
        echo "PUT /_index_template/$svc"
        gunzip -c "$asset_dir/index_template.json.gz" \
          | curl -sSfk -u "$OPENSEARCH_USER:$OPENSEARCH_PASSWORD" \
                 -H 'Content-Type: application/json' \
                 -X PUT --data-binary @- \
                 "$OPENSEARCH_ENDPOINT/_index_template/$svc"
        echo
      fi

      if [ -f "$asset_dir/dashboard.ndjson.gz" ]; then
        echo "POST $svc saved objects -> OSD"
        gunzip -c "$asset_dir/dashboard.ndjson.gz" \
          | curl -sSfk -u "$OSD_USER:$OSD_PASSWORD" \
                 -H 'osd-xsrf: true' \
                 -F "file=@-;filename=$svc.ndjson" \
                 "$OSD_ENDPOINT/api/saved_objects/_import?overwrite=true"
        echo
      fi
    done
---
apiVersion: batch/v1
kind: Job
metadata:
  name: osdashboards-install
  labels:
    app.kubernetes.io/name: osdashboards
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: install
          image: curlimages/curl:8.11.0
          command: ["/bin/sh", "/scripts/install.sh"]
          env:
            - name: OPENSEARCH_ENDPOINT
              valueFrom: { secretKeyRef: { name: vector-opensearch, key: endpoint } }
            - name: OPENSEARCH_USER
              valueFrom: { secretKeyRef: { name: vector-opensearch, key: username } }
            - name: OPENSEARCH_PASSWORD
              valueFrom: { secretKeyRef: { name: vector-opensearch, key: password } }
            - name: OSD_ENDPOINT
              value: {{ .Values.osdashboards.endpoint | quote }}
            - name: OSD_USER
              valueFrom: { secretKeyRef: { name: vector-opensearch, key: username } }
            - name: OSD_PASSWORD
              valueFrom: { secretKeyRef: { name: vector-opensearch, key: password } }
            - name: SERVICES
              value: {{ join " " .Values.osdashboards.services | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { memory: 64Mi }
          volumeMounts:
            - { name: scripts, mountPath: /scripts, readOnly: true }
            {{- range .Values.osdashboards.services }}
            - { name: assets-{{ . }}, mountPath: /assets/{{ . }}, readOnly: true }
            {{- end }}
      volumes:
        - name: scripts
          configMap:
            name: osdashboards-install
            defaultMode: 0555
        {{- range .Values.osdashboards.services }}
        - name: assets-{{ . }}
          configMap:
            name: osdashboards-{{ . }}
        {{- end }}
{{- end }}
