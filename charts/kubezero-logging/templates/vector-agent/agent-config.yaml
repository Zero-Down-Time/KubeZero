{{- if (index .Values "vector-agent" "enabled") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-agent-config
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: Agent
data:
  vector.yaml: |
    data_dir: /vector-data-dir

    api:
      enabled: true
      address: 0.0.0.0:8686

    sources:
      # Tails this node's pod logs, enriched with .kubernetes.* metadata.
      k8s:
        type: kubernetes_logs
      {{- if (index .Values "vector-agent" "podMonitor" "enabled") }}
      internal_metrics:
        type: internal_metrics
      {{- end }}

    transforms:
      # Drop unbounded annotation maps at the node (large, never indexed) to cut
      # wire/gRPC batch size. pod_labels kept (flat_object in the index template).
      drop_annotations:
        type: remap
        inputs: [k8s]
        source: |
          del(.kubernetes.pod_annotations)
          del(.kubernetes.namespace_annotations)
      {{- if (index .Values "vector-agent" "podMonitor" "enabled") }}
      # Drop metrics emitted BY the metrics plumbing itself
      metrics_clean:
        type: filter
        inputs: [internal_metrics]
        condition: '!includes(["internal_metrics", "metrics_clean"], string(.tags.component_id) ?? "")'
      {{- end }}

    sinks:
      # Forward to the cluster aggregator (:6000, vector protocol).
      to_aggregator:
        type: vector
        inputs: [drop_annotations]
        address: {{ .Release.Name }}-vector:6000
        acknowledgements:
          enabled: true
        # Bound gRPC message size; oversized batches RST below Vector's log layer
        # (agent sees "connection reset", aggregator silent).
        batch:
          max_events: 256
          timeout_secs: 5
        # block backpressures kubernetes_logs when the aggregator is down; the
        # node's log files are then the buffer (no Vector-side disk buffer).
        buffer:
          type: memory
          max_events: 2000
          when_full: block
      {{- if (index .Values "vector-agent" "podMonitor" "enabled") }}
      # Metrics endpoint scraped by the PodMonitor (named port prom-exporter).
      metrics:
        type: prometheus_exporter
        inputs: [metrics_clean]
        address: 0.0.0.0:9090
      {{- end }}
{{- end }}
