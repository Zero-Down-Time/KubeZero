{{- if and .Values.vector.enabled (or .Values.vector.kubernetes.indexTemplate.enabled .Values.vector.internalRetention.enabled) }}
# Post-install/upgrade hook that bootstraps OpenSearch-side assets for this
# logging stack via the OS API (templates apply to indices created after the
# PUT). Two independent concerns, each toggled in values:
#   - kubernetes-* composable index template (flat_object label maps etc.)
#   - ISM retention policy that deletes OpenSearch's own internal indices
#     (query-insights top_queries-*, security plugin security-auditlog-*) after
#     N days so they don't grow unbounded.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-kubernetes-index-template
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: Aggregator
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  {{- if .Values.vector.kubernetes.indexTemplate.enabled }}
  kubernetes.json: |
    {
      "index_patterns": ["kubernetes-*"],
      "template": {
        "settings": {
          "index": {
            "number_of_shards": {{ .Values.vector.kubernetes.indexTemplate.shards }},
            "number_of_replicas": {{ .Values.vector.kubernetes.indexTemplate.replicas }},
            "mapping": {
              "total_fields": { "limit": {{ .Values.vector.kubernetes.indexTemplate.totalFieldsLimit }} },
              "ignore_malformed": true
            }
          }
        },
        "mappings": {
          "dynamic_templates": [
            {
              "strings_as_keyword": {
                "match_mapping_type": "string",
                "mapping": { "type": "keyword", "ignore_above": 1024 }
              }
            }
          ],
          "properties": {
            "@timestamp": { "type": "date" },
            "message":    { "type": "text" },
            "id":         { "type": "keyword" },
            "file":       { "type": "keyword" },
            "stream":     { "type": "keyword" },
            "kubernetes": {
              "properties": {
                "pod_labels":          { "type": "flat_object" },
                "pod_annotations":     { "type": "flat_object" },
                "namespace_labels":    { "type": "flat_object" },
                "namespace_annotations": { "type": "flat_object" },
                "node_labels":         { "type": "flat_object" },
                "pod_name":            { "type": "keyword" },
                "pod_namespace":       { "type": "keyword" },
                "pod_node_name":       { "type": "keyword" },
                "pod_ip":              { "type": "keyword" },
                "container_name":      { "type": "keyword" },
                "container_id":        { "type": "keyword" },
                "container_image":     { "type": "keyword" }
              }
            }
          }
        }
      }
    }
  {{- end }}
  {{- if .Values.vector.internalRetention.enabled }}
  internal-retention-ism.json: |
    {
      "policy": {
        "description": "kubezero-logging: delete internal OpenSearch indices after {{ .Values.vector.internalRetention.days }} days",
        "default_state": "hot",
        "states": [
          {
            "name": "hot",
            "actions": [],
            "transitions": [
              { "state_name": "delete", "conditions": { "min_index_age": "{{ .Values.vector.internalRetention.days }}d" } }
            ]
          },
          {
            "name": "delete",
            "actions": [ { "delete": {} } ],
            "transitions": []
          }
        ],
        "ism_template": [
          { "index_patterns": {{ .Values.vector.internalRetention.patterns | toJson }}, "priority": 100 }
        ]
      }
    }
  {{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vector-kubernetes-index-template
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: Aggregator
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: install
          image: curlimages/curl:8.11.0
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              i=0
              until curl -sSfk -u "$OPENSEARCH_USER:$OPENSEARCH_PASSWORD" \
                    "$OPENSEARCH_ENDPOINT/_cluster/health" >/dev/null 2>&1; do
                i=$((i + 1))
                if [ $i -ge 60 ]; then echo "timeout waiting for OpenSearch" >&2; exit 1; fi
                sleep 5
              done
              {{- if .Values.vector.kubernetes.indexTemplate.enabled }}
              echo "PUT /_index_template/kubernetes"
              curl -sSk --fail-with-body -u "$OPENSEARCH_USER:$OPENSEARCH_PASSWORD" \
                   -H 'Content-Type: application/json' \
                   -X PUT --data-binary @/assets/kubernetes.json \
                   "$OPENSEARCH_ENDPOINT/_index_template/kubernetes"
              echo
              {{- end }}
              {{- if .Values.vector.internalRetention.enabled }}
              POLICY=internal-index-retention
              echo "PUT _plugins/_ism/policies/$POLICY"
              # ISM policy PUT needs if_seq_no/if_primary_term when it already
              # exists (idempotent across upgrades); omit them to create.
              meta=$(curl -sSk -u "$OPENSEARCH_USER:$OPENSEARCH_PASSWORD" \
                     "$OPENSEARCH_ENDPOINT/_plugins/_ism/policies/$POLICY" || true)
              seq=$(printf '%s' "$meta"  | grep -oE '"_seq_no":[0-9]+'       | grep -oE '[0-9]+' | head -1 || true)
              prim=$(printf '%s' "$meta" | grep -oE '"_primary_term":[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
              q=""
              if [ -n "$seq" ] && [ -n "$prim" ]; then q="?if_seq_no=$seq&if_primary_term=$prim"; fi
              curl -sSk --fail-with-body -u "$OPENSEARCH_USER:$OPENSEARCH_PASSWORD" \
                   -H 'Content-Type: application/json' \
                   -X PUT --data-binary @/assets/internal-retention-ism.json \
                   "$OPENSEARCH_ENDPOINT/_plugins/_ism/policies/$POLICY$q"
              echo
              # ism_template only manages NEW indices; attach to existing ones too
              # (already-managed indices report a harmless failure -> best effort).
              echo "attach $POLICY to existing indices"
              curl -sSk -u "$OPENSEARCH_USER:$OPENSEARCH_PASSWORD" \
                   -H 'Content-Type: application/json' \
                   -X POST --data "{\"policy_id\":\"$POLICY\"}" \
                   "$OPENSEARCH_ENDPOINT/_plugins/_ism/add/{{ join "," .Values.vector.internalRetention.patterns }}" || true
              echo
              {{- end }}
          env:
            - name: OPENSEARCH_ENDPOINT
              valueFrom: { secretKeyRef: { name: vector-opensearch, key: endpoint } }
            - name: OPENSEARCH_USER
              valueFrom: { secretKeyRef: { name: vector-opensearch, key: username } }
            - name: OPENSEARCH_PASSWORD
              valueFrom: { secretKeyRef: { name: vector-opensearch, key: password } }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { memory: 64Mi }
          volumeMounts:
            - { name: template, mountPath: /assets, readOnly: true }
      volumes:
        - name: template
          configMap:
            name: vector-kubernetes-index-template
{{- end }}
