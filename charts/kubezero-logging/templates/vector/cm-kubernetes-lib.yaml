{{- if .Values.vector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-kubernetes-lib
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: Aggregator
data:
  remap_kubernetes.yaml: |
    transforms:
      parsed_kubernetes:
        type: remap
        inputs:
          - event_router.kubernetes
        source: |
          %event_type = "kubernetes"

          # fall back to now() if a malformed event lacks .timestamp.
          ts = .timestamp
          if !is_timestamp(ts) { ts = now() }
          ."@timestamp" = ts

          # Idempotent _id: hash of file + ns timestamp + message.
          nanos = to_unix_timestamp(.timestamp, unit: "nanoseconds") ?? 0
          fp = (string(.file) ?? "") + "|" + to_string(nanos) + "|" + (string(.message) ?? "")
          .id = sha2(fp, variant: "SHA-256")

          # Nest app-log JSON under kube.<namespace> so same field names in
          # different namespaces don't collide in OpenSearch mappings.
          ns = string(.kubernetes.pod_namespace) ?? "unknown"
          if is_string(.message) {
            parsed, err = parse_json(.message)
            if err == null && is_object(parsed) {
              . = set!(., ["kube", ns], parsed)
              del(.message)
            }
          }

          del(.timestamp)
          del(.source_type)

          # Event-time (epoch-ms) for set_index_suffix; never stored.
          .index_ts = to_unix_timestamp!(ts, unit: "milliseconds")

          . = compact(., recursive: true, null: true)
{{- end }}
