{{- if .Values.vector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-kubernetes-lib
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: Aggregator
data:
  remap_kubernetes.yaml: |
    transforms:
      parsed_kubernetes:
        type: remap
        inputs:
          - event_router.kubernetes
        source: |
          %event_type = "kubernetes"

          # kubernetes_logs stamps .timestamp as the log line's time; fall back
          # to now() if a malformed event lacks it.
          ts = .timestamp
          if !is_timestamp(ts) { ts = now() }
          ."@timestamp" = ts

          # Idempotent _id: same physical log line (file + nanosecond timestamp +
          # message) hashes identically
          nanos = to_unix_timestamp(.timestamp, unit: "nanoseconds") ?? 0
          fp = (string(.file) ?? "") + "|" + to_string(nanos) + "|" + (string(.message) ?? "")
          .id = sha2(fp, variant: "SHA-256")

          # Nest a structured (JSON) app-log payload under kube.<namespace> so the
          # same field name across different namespaces maps to a distinct path,
          # avoiding cross-namespace OpenSearch mapping collisions
          ns = string(.kubernetes.pod_namespace) ?? "unknown"
          if is_string(.message) {
            parsed, err = parse_json(.message)
            if err == null && is_object(parsed) {
              . = set!(., ["kube", ns], parsed)
              del(.message)
            }
          }

          # .timestamp is replaced by .@timestamp
          del(.timestamp)
          del(.source_type)

          # Carry the canonical event-time as epoch-ms; the final
          # set_index_suffix step (or the remote aggregator) derives
          # index_suffix from it. Never stored (dropped before the sink).
          .index_ts = to_unix_timestamp(ts, unit: "milliseconds")

          . = compact(., recursive: true, null: true)
{{- end }}
