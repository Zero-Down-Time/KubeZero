{{- if .Values.vector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-cloudtrail-lib
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: Aggregator
data:
  remap_cloudtrail.yaml: |
    transforms:
      # One event per CloudTrail record; .body may be a decoded object or JSON text.
      cloudtrail_unpack:
        type: remap
        inputs:
          - event_router.cloudtrail
        source: |
          %event_type = "aws.cloudtrail"
          body = .body
          if is_string(body) {
              body = parse_json(string!(body)) ?? {}
          }
          . = array(body.Records) ?? []

      # Flat record matching the AWS CLO cloudtrail template. requestParameters/
      # responseElements are stringified to avoid per-API mapping conflicts.
      parsed_cloudtrail:
        type: remap
        inputs:
          - cloudtrail_unpack
        source: |
          raw = .

          ts = parse_timestamp(raw.eventTime, "%+") ??
               parse_timestamp(raw.eventTime, "%Y-%m-%dT%H:%M:%SZ") ??
               now()

          if exists(raw.requestParameters) && !is_null(raw.requestParameters) {
              raw.requestParameters = encode_json(raw.requestParameters)
          }
          if exists(raw.responseElements) && !is_null(raw.responseElements) {
              raw.responseElements = encode_json(raw.responseElements)
          }

          . = raw

          # Event-time (epoch-ms) for set_index_suffix; never stored.
          .index_ts = to_unix_timestamp(ts, unit: "milliseconds")
{{- end }}
