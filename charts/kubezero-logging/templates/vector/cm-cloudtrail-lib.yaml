{{- if .Values.vector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-cloudtrail-lib
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: Aggregator
data:
  remap_cloudtrail.yaml: |
    transforms:
      # Explode siphon-wrapped CloudTrail Records into one event per record.
      # Wire format: { observed_at, attributes: {...}, body: { Records: [...] } }.
      # `.body` may arrive as a decoded object or as JSON text — handle both.
      cloudtrail_unpack:
        type: remap
        inputs:
          - event_router.cloudtrail
        source: |
          %event_type = "aws.cloudtrail"
          body = .body
          if is_string(body) {
              body = parse_json(string!(body)) ?? {}
          }
          . = array(body.Records) ?? []

      # Emit the flat CloudTrail record at top level, matching the AWS CLO
      # cloudtrail index template (eventName / eventTime / eventID / etc. as
      # top-level fields). requestParameters and responseElements are mapped
      # as `keyword` in CLO; stringify them so the index doesn't try to
      # interpret arbitrary per-API sub-fields (the source of the prior
      # `requestParameters.endTime` date-parse failures).
      parsed_cloudtrail:
        type: remap
        inputs:
          - cloudtrail_unpack
        source: |
          raw = .

          ts = parse_timestamp(raw.eventTime, "%+") ??
               parse_timestamp(raw.eventTime, "%Y-%m-%dT%H:%M:%SZ") ??
               now()

          if exists(raw.requestParameters) && !is_null(raw.requestParameters) {
              raw.requestParameters = encode_json(raw.requestParameters)
          }
          if exists(raw.responseElements) && !is_null(raw.responseElements) {
              raw.responseElements = encode_json(raw.responseElements)
          }

          . = raw

          # Index suffix templated from CloudTrail eventTime (not vector ingest
          # time) so backfills land in the correct dated index. The strftime
          # format is configurable via vector.cloudtrail.indexSuffix.
          .index_suffix = format_timestamp!(ts, {{ default "%Y.%m.%d" .Values.vector.cloudtrail.indexSuffix | quote }})
{{- end }}
