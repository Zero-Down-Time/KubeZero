{{- if .Values.vector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-cloudfront-lib
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: Aggregator
data:
  remap_cloudfront.yaml: |
    transforms:
      # One event per CloudFront V1 log line; #-prefixed header lines dropped.
      cloudfront_unpack:
        type: remap
        inputs:
          - event_router.cloudfront
        source: |
          %event_type = "aws.cloudfront"

          raw   = to_string(.body) ?? ""
          lines = split(raw, "\n")
          data  = filter(lines) -> |_idx, line| {
            line != "" && !starts_with(line, "#")
          }
          # Wrap each row as an object (Vector events must be objects); read via ._line.
          . = map_values(data) -> |line| { { "_line": line } }

      # Flat document matching the AWS CLO cloudfront template.
      parsed_cloudfront:
        type: remap
        inputs:
          - cloudfront_unpack
        source: |
          line   = string!(._line)
          fields = split(line, "\t")

          # Bail on short/malformed rows.
          if length(fields) < 33 {
            abort
          }

          timestamp_str = string!(fields[0]) + " " + string!(fields[1])
          ts            = parse_timestamp(timestamp_str, "%Y-%m-%d %H:%M:%S") ?? now()

          . = {
              "timestamp":                     timestamp_str,
              "x-edge-location":               fields[2],
              "sc-bytes":                      to_int(fields[3])  ?? null,
              "c-ip":                          fields[4],
              "cs-method":                     fields[5],
              "cs-host":                       fields[6],
              "cs-uri-stem":                   fields[7],
              "sc-status":                     fields[8],
              "cs-referer":                    fields[9],
              "cs-user-agent":                 fields[10],
              "cs-uri-query":                  fields[11],
              "cs-cookie":                     fields[12],
              "x-edge-result-type":            fields[13],
              "x-edge-request-id":             fields[14],
              "x-host-header":                 fields[15],
              "cs-protocol":                   fields[16],
              "cs-bytes":                      to_int(fields[17]) ?? null,
              "time-taken":                    to_float(fields[18]) ?? null,
              "x-forwarded-for":               fields[19],
              "ssl-protocol":                  fields[20],
              "ssl-cipher":                    fields[21],
              "x-edge-response-result-type":   fields[22],
              "cs-protocol-version":           fields[23],
              "fle-status":                    fields[24],
              "fle-encrypted-fields":          fields[25],
              "c-port":                        fields[26],
              "time-to-first-byte":            to_float(fields[27]) ?? null,
              "x-edge-detailed-result-type":   fields[28],
              "sc-content-type":               fields[29],
              "sc-content-len":                to_int(fields[30]) ?? null,
              "sc-range-start":                to_int(fields[31]) ?? null,
              "sc-range-end":                  to_int(fields[32]) ?? null
          }

          # .id mirrors x-edge-request-id (hyphen-free path for id_key dedup).
          .id = fields[14]

          {{- if .Values.vector.geoip.enabled }}
          geo = get_enrichment_table_record("geoip_city", { "ip": ."c-ip" }) ?? {}
          if !is_empty(geo) {
              .geo_iso_code = geo.country_code
              .geo_country  = geo.country_name
              .geo_city     = geo.city_name
              if geo.latitude != null && geo.longitude != null {
                  .geo_location = { "lat": geo.latitude, "lon": geo.longitude }
              }
          }
          {{- end }}

          # User-agent split, no DB needed. CloudFront percent-encodes
          # cs-user-agent, so decode before parsing. ua_category has no
          # parse_user_agent equivalent and is left unset.
          ua = parse_user_agent(decode_percent(."cs-user-agent") ?? string(."cs-user-agent") ?? "")
          .ua_browser         = ua.browser.family
          .ua_browser_version = ua.browser.version
          .ua_os              = ua.os.family
          .ua_os_version      = ua.os.version
          .ua_device          = ua.device.family

          # Event-time (epoch-ms) for set_index_suffix; never stored.
          .index_ts = to_unix_timestamp(ts, unit: "milliseconds")
{{- end }}
