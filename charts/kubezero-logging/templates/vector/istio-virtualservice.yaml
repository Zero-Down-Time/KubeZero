{{- if index .Values "vector" "istio" "enabled" }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ template "kubezero-lib.fullname" . }}-vector
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "kubezero-lib.labels" . | indent 4 }}
spec:
  hosts:
  - {{ index .Values "vector" "istio" "url" }}
  gateways:
  - {{ default "istio-system/ingressgateway" ( index .Values "vector" "istio" "gateway" ) }}
  http:
  # Allow only POST /ingest/<event-name> (lowercase): blocks arbitrary URIs and
  # path traversal while allowing new event names without chart edits.
  - match:
    - method:
        exact: POST
      uri:
        regex: {{ default "^/ingest/[a-z][a-z0-9._-]*$" (index .Values "vector" "istio" "ingestPathRegex") | quote }}
    route:
    - destination:
        host: {{ template "kubezero-lib.fullname" $ }}-vector
        port:
          number: 8080
{{- end }}
