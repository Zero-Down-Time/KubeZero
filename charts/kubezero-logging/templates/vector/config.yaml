{{- if .Values.vector.enabled }}
{{- $rf := .Values.vector.remoteForward.enabled }}
{{- /* Storing node: OpenSearch sinks + accepts forwarded events. Forward-only
       node (remoteForward.enabled): neither. */}}
{{- $opensearch := not $rf }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-aggregator-config
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: Aggregator
data:
  vector.yaml: |
    data_dir: /vector-data-dir

    api:
      enabled: true
      address: 0.0.0.0:8686

    {{- if .Values.vectorHttpIngest.enabled }}
    # CSV token table for http_in custom auth (Secret: vector-http-tokens).
    enrichment_tables:
      auth_data:
        type: file
        file:
          path: /etc/vector-auth/tokens.csv
          encoding: { type: csv }
        schema:
          token_sha256: string
          tenant: string
          active: boolean
    {{- end }}

    sources:
      vector_in:
        type: vector
        address: 0.0.0.0:6000
        version: "2"
        acknowledgements:
          enabled: true
    {{- if .Values.vectorHttpIngest.enabled }}
      # Remote HTTP ingest from siphon (POST /ingest/<event.name>).
      http_in:
        type: http_server
        address: 0.0.0.0:8080
        path: /
        strict_path: false
        method: POST
        decoding:
          codec: json
        # Capture the auth header onto the event for tenant derivation below.
        headers:
          - authorization
        auth:
          strategy: custom
          # The whole Authorization value is the opaque token (no Bearer prefix).
          source: |
            digest = sha2!(.headers.authorization, variant: "SHA-256")
            row = get_enrichment_table_record!("auth_data", { "token_sha256": digest })
            row.active == true
    {{- end }}

      internal_metrics:
        type: internal_metrics

    transforms:
      {{- if .Values.vectorHttpIngest.enabled }}
      # Tenant from the validated token; drop the token before any sink.
      http_auth_tenant:
        type: remap
        inputs:
          - http_in
        source: |
          if exists(.authorization) {
            digest = sha2(string(.authorization) ?? "", variant: "SHA-256")
            row    = get_enrichment_table_record("auth_data", { "token_sha256": digest }) ?? {}
            .tenant = string(row.tenant) ?? "unknown"
            del(.authorization)
          }
      {{- end }}

      normalize:
        type: remap
        inputs:
          - vector_in
          {{- if .Values.vectorHttpIngest.enabled }}
          - http_auth_tenant
          {{- end }}
        source: |
          # k8s logs are nested under kube.<ns> by parsed_kubernetes to avoid
          # cross-namespace mapping collisions, so don't root-merge them here.
          if !exists(.kubernetes) && is_string(.message) {
            parsed, err = parse_json(.message)
            if err == null && is_object(parsed) {
              . = merge(., object!(parsed), deep: true)
            }
          }

      {{- if $opensearch }}
      # Forwarded events (from a remote aggregator) bypass event_router/parsed_*
      # to avoid double-parsing; the route never matches normal local events.
      ingress_class:
        type: route
        inputs:
          - normalize
        route:
          forwarded: '.forwarded == true'

      # Re-promote .event_type -> %event_type for routing; drop the wire-only
      # helper fields. .index_ts rides through to set_index_suffix.
      forwarded_promote:
        type: remap
        inputs:
          - ingress_class.forwarded
        source: |
          if exists(.event_type) {
            %event_type = string!(.event_type)
            del(.event_type)
          }
          del(.forwarded)
      {{- end }}

      event_router:
        type: route
        inputs:
          {{- if $opensearch }}
          - ingress_class._unmatched
          {{- else }}
          - normalize
          {{- end }}
        route:
          cloudtrail: |
            .attributes."event.name" == "aws.s3.object_received" &&
            contains(string(.attributes."aws.s3.key") ?? "", "/CloudTrail/")
          vpcflow: |
            .attributes."event.name" == "aws.s3.object_received" &&
            contains(string(.attributes."aws.s3.key") ?? "", "/vpcflowlogs/")
          cloudfront: |
            .attributes."event.name" == "aws.s3.object_received" &&
            match(string(.attributes."aws.s3.key") ?? "",
                  r'E[A-Z0-9]+\.\d{4}-\d{2}-\d{2}-\d{2}\.[A-Za-z0-9]+\.gz$')
          # S3 server access logs land in the target bucket with the key
          # convention `[<prefix>]YYYY-MM-DD-HH-MM-SS-<16-char-unique-id>`.
          s3-access-logs: |
            .attributes."event.name" == "aws.s3.object_received" &&
            match(string(.attributes."aws.s3.key") ?? "",
                  r'\d{4}-\d{2}-\d{2}-\d{2}-\d{2}-\d{2}-[A-Z0-9]{16}$')
          # CloudWatch Logs via siphon
          lambda: |
            starts_with(string(.body.logGroup) ?? "", "/aws/lambda/")
          # vector-agent node logs: only kubernetes_logs events set .kubernetes.
          kubernetes: |
            exists(.kubernetes.pod_name)


      {{- if $opensearch }}
      # Derive the dated index_suffix from the uniform .index_ts (event-time,
      # epoch-ms) using THIS cluster's per-service format, so the remote owns
      # granularity/retention for forwarded events. .index_ts is then dropped.
      set_index_suffix:
        type: remap
        inputs:
          - parsed_*
          - event_router._unmatched
          - forwarded_promote
        source: |
          fmt = ""
          if %event_type == "aws.cloudtrail" {
            fmt = {{ default "%Y.%m.%d" .Values.vector.cloudtrail.indexSuffix | quote }}
          } else if %event_type == "aws.cloudfront" {
            fmt = {{ default "%Y.%m.%d" .Values.vector.cloudfront.indexSuffix | quote }}
          } else if %event_type == "aws.s3-access-logs" {
            fmt = {{ default "%Y.%m.%d" (index .Values.vector "s3-access-logs" "indexSuffix") | quote }}
          } else if %event_type == "aws.lambda" {
            fmt = {{ default "%Y.%m.%d" .Values.vector.lambda.indexSuffix | quote }}
          } else if %event_type == "kubernetes" {
            fmt = {{ default "%Y.%m.%d" .Values.vector.kubernetes.indexSuffix | quote }}
          }
          if fmt != "" {
            ts = from_unix_timestamp(to_int(.index_ts) ?? 0, unit: "milliseconds") ?? now()
            .index_suffix = format_timestamp!(ts, fmt)
          }
          del(.index_ts)

      sink_router:
        type: route
        inputs:
          - set_index_suffix
        route:
          cloudtrail:     '%event_type == "aws.cloudtrail"'
          cloudfront:     '%event_type == "aws.cloudfront"'
          s3-access-logs: '%event_type == "aws.s3-access-logs"'
          lambda:         '%event_type == "aws.lambda"'
          kubernetes:     '%event_type == "kubernetes"'
      {{- end }}

      {{- if $rf }}
      # %event_type is metadata (lost over JSON), so lift it to a field and mark
      # .forwarded so the remote bypasses its parsers. .index_ts/.id ride along;
      # the remote decides index_suffix/retention. index_suffix is not sent.
      forward_prep:
        type: remap
        inputs:
          - parsed_*
          - event_router._unmatched
        source: |
          .forwarded = true
          if exists(%event_type) {
            .event_type = %event_type
          }
      {{- end }}

      # Drop metrics emitted BY the metrics plumbing itself
      metrics_clean:
        type: filter
        inputs: [internal_metrics]
        condition: '!includes(["internal_metrics", "metrics_clean"], string(.tags.component_id) ?? "")'

    sinks:
      {{- if $opensearch }}
      opensearch_cloudtrail:
        type: elasticsearch
        inputs:
          - sink_router.cloudtrail
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        # _id = CloudTrail eventID.
        id_key: eventID
        bulk:
          action: index
          index: 'cloudtrail-{{ "{{ index_suffix }}" }}'
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        encoding:
          except_fields: ["index_suffix"]
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }

      opensearch_cloudfront:
        type: elasticsearch
        inputs:
          - sink_router.cloudfront
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        # _id = CloudFront x-edge-request-id (mirrored to .id, hyphen-free path).
        id_key: id
        bulk:
          action: index
          index: 'cloudfront-{{ "{{ index_suffix }}" }}'
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        encoding:
          except_fields: ["index_suffix"]
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }

      opensearch_s3-access-logs:
        type: elasticsearch
        inputs:
          - sink_router.s3-access-logs
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        # _id = S3 request_id (mirrored to .id).
        id_key: id
        bulk:
          action: index
          index: 's3-access-logs-{{ "{{ index_suffix }}" }}'
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        encoding:
          except_fields: ["index_suffix"]
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }

      opensearch_lambda:
        type: elasticsearch
        inputs:
          - sink_router.lambda
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        # _id = CloudWatch logEvents[].id (mirrored to .id).
        id_key: id
        bulk:
          action: index
          index: 'lambda-{{ "{{ index_suffix }}" }}'
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        encoding:
          except_fields: ["index_suffix"]
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }

      opensearch_kubernetes:
        type: elasticsearch
        inputs:
          - sink_router.kubernetes
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        # _id = synthetic sha256(file|ts|message) for idempotent retries.
        id_key: id
        bulk:
          action: index
          # flat_object label mappings come from the kubernetes index template.
          index: 'kubernetes-{{ "{{ index_suffix }}" }}'
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        encoding:
          except_fields: ["index_suffix"]
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }

      opensearch_logs:
        type: elasticsearch
        inputs:
          - sink_router._unmatched
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        bulk: { index: "logs-%Y.%m.%d" }
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        encoding:
          except_fields: ["index_suffix"]
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }
      {{- end }}

      {{- if $rf }}
      # Forward all events to the remote aggregator (HTTPS + bearer token).
      remote_forward:
        type: http
        inputs:
          - forward_prep
        uri: {{ .Values.vector.remoteForward.uri | quote }}
        method: post
        encoding:
          codec: json
        auth:
          strategy: bearer
          token: "${VECTOR_REMOTE_TOKEN}"
        compression: gzip
        acknowledgements:
          enabled: true
        request:
          retry_attempts: {{ .Values.vector.remoteForward.request.retryAttempts }}
        buffer:
          type: disk
          max_size: {{ .Values.vector.remoteForward.buffer.maxSize }}
          when_full: {{ .Values.vector.remoteForward.buffer.whenFull }}
        healthcheck:
          enabled: false
      {{- end }}

      metrics:
        type: prometheus_exporter
        inputs: [metrics_clean]
        address: 0.0.0.0:9090
{{- end }}
