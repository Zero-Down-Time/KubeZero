{{- if .Values.vector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-aggregator-config
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: Aggregator
data:
  vector.yaml: |
    data_dir: /vector-data-dir

    api:
      enabled: true
      address: 0.0.0.0:8686

    {{- if .Values.vectorHttpIngest.enabled }}
    # CSV token table for http_in custom auth (Secret: vector-http-tokens).
    enrichment_tables:
      auth_data:
        type: file
        file:
          path: /etc/vector-auth/tokens.csv
          encoding: { type: csv }
        schema:
          token_sha256: string
          tenant: string
          active: boolean
    {{- end }}

    sources:
      vector_in:
        type: vector
        address: 0.0.0.0:6000
        version: "2"
    #   tls:
    #     enabled: true
    #     crt_file: /etc/vector-tls/tls.crt
    #     key_file: /etc/vector-tls/tls.key
    #     ca_file: /etc/vector-tls/ca.crt
    #     verify_certificate: true
    {{- if .Values.vectorHttpIngest.enabled }}
      # Remote HTTP events from siphon: POST /ingest/<event.name> with body
      #   { observed_at, attributes: {"event.name", "aws.s3.bucket", ...}, body }
      # Bearer-token auth. Path is informational (path-vs-method gate lives in
      # istio); routing uses attributes."event.name". strict_path: false so the
      # source accepts any path under the istio-allowed prefix.
      http_in:
        type: http_server
        address: 0.0.0.0:8080
        path: /
        strict_path: false
        method: POST
        decoding:
          codec: json
        headers:
          - authorization
        auth:
          strategy: custom
          source: |
            parts = split!(.headers.authorization, " ", 2)
            if parts[0] != "Bearer" {
              false
            } else {
              digest = sha2!(parts[1], variant: "SHA-256")
              row = get_enrichment_table_record!("auth_data", { "token_sha256": digest })
              row.active == true
            }
    {{- end }}

      internal_metrics:
        type: internal_metrics

    transforms:
      {{- if .Values.vectorHttpIngest.enabled }}
      # tenant from validated bearer token, then drop the token
      http_auth_tenant:
        type: remap
        inputs:
          - http_in
        source: |
          if exists(.authorization) {
            tok    = split(string(.authorization) ?? "", " ", 2)[1]
            digest = sha2(tok, variant: "SHA-256") ?? ""
            row    = get_enrichment_table_record("auth_data", { "token_sha256": digest }) ?? {}
            .tenant = string(row.tenant) ?? "unknown"
            del(.authorization)
          }
      {{- end }}

      normalize:
        type: remap
        inputs:
          - vector_in
          {{- if .Values.vectorHttpIngest.enabled }}
          - http_auth_tenant
          {{- end }}
        source: |
          if is_string(.message) {
            parsed, err = parse_json(.message)
            if err == null && is_object(parsed) {
              . = merge(., object!(parsed), deep: true)
            }
          }

      # Classify siphon-wrapped events. All S3-sourced deliveries arrive as
      # attributes."event.name" == "aws.s3.object_received"; the discriminator
      # between log types is the S3 key naming convention. Routes are matched
      # in order — the cloudfront regex is more specific than the cloudtrail
      # substring, but ordering still puts each type next to its own marker.
      event_router:
        type: route
        inputs:
          - normalize
        route:
          cloudtrail: |
            .attributes."event.name" == "aws.s3.object_received" &&
            contains(string(.attributes."aws.s3.key") ?? "", "/CloudTrail/")
          vpcflow: |
            .attributes."event.name" == "aws.s3.object_received" &&
            contains(string(.attributes."aws.s3.key") ?? "", "/vpcflowlogs/")
          cloudfront: |
            .attributes."event.name" == "aws.s3.object_received" &&
            match(string(.attributes."aws.s3.key") ?? "",
                  r'E[A-Z0-9]+\.\d{4}-\d{2}-\d{2}-\d{2}\.[A-Za-z0-9]+\.gz$')
          # S3 server access logs land in the target bucket with the key
          # convention `[<prefix>]YYYY-MM-DD-HH-MM-SS-<16-char-unique-id>`.
          s3: |
            .attributes."event.name" == "aws.s3.object_received" &&
            match(string(.attributes."aws.s3.key") ?? "",
                  r'\d{4}-\d{2}-\d{2}-\d{2}-\d{2}-\d{2}-[A-Z0-9]{16}$')


      sink_router:
        type: route
        inputs:
          - parsed_*
          - event_router._unmatched
        route:
          cloudtrail: '%event_type == "aws.cloudtrail"'
          cloudfront: '%event_type == "aws.cloudfront"'
          s3:         '%event_type == "aws.s3"'

      # Drop metrics emitted BY the metrics plumbing itself
      metrics_clean:
        type: filter
        inputs: [internal_metrics]
        condition: '!includes(["internal_metrics", "metrics_clean"], string(.tags.component_id) ?? "")'

    sinks:
      opensearch_cloudtrail:
        type: elasticsearch
        inputs:
          - sink_router.cloudtrail
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        # _id = CloudTrail eventID (top-level after flat-shape parser rewrite).
        id_key: eventID
        bulk:
          action: index
          # AWS CLO cloudtrail-* index pattern. index_suffix = %Y.%m.%d
          # derived from eventTime so backfills land in the correct daily index.
          index: 'cloudtrail-{{ "{{ index_suffix }}" }}'
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        #buffer: { type: disk, max_size: 268435488, when_full: block }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }

      opensearch_cloudfront:
        type: elasticsearch
        inputs:
          - sink_router.cloudfront
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        # _id = CloudFront x-edge-request-id. Mirrored into .id by the parser
        # to keep this path hyphen-free.
        id_key: id
        bulk:
          action: index
          # AWS CLO cloudfront-* index pattern. index_suffix = %Y.%m.%d
          # derived from the log line's date/time fields.
          index: 'cloudfront-{{ "{{ index_suffix }}" }}'
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }

      opensearch_s3:
        type: elasticsearch
        inputs:
          - sink_router.s3
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        # _id = S3 request_id (mirrored to .id by the parser).
        id_key: id
        bulk:
          action: index
          # AWS CLO s3-* index pattern. index_suffix derived from each log
          # line's bracketed timestamp.
          index: 's3-{{ "{{ index_suffix }}" }}'
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }

      opensearch_logs:
        type: elasticsearch
        inputs:
          - sink_router._unmatched
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        bulk: { index: "logs-%Y.%m.%d" }
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }
        #buffer: { type: disk, max_size: 268435488, when_full: block }

      metrics:
        type: prometheus_exporter
        inputs: [metrics_clean]
        address: 0.0.0.0:9090
{{- end }}
