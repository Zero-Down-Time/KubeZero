{{- if .Values.vector.enabled }}
{{- $rf := .Values.vector.remoteForward.enabled }}
{{- /* A storing node ($opensearch) renders the local OpenSearch sinks + sink_router
       and always accepts forwarded events (ingress_class) in parallel with the
       normal parse path. A forward-only node (remoteForward.enabled) does neither. */}}
{{- $opensearch := not $rf }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-aggregator-config
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: Aggregator
data:
  vector.yaml: |
    data_dir: /vector-data-dir

    api:
      enabled: true
      address: 0.0.0.0:8686

    {{- if .Values.vectorHttpIngest.enabled }}
    # CSV token table for http_in custom auth (Secret: vector-http-tokens).
    enrichment_tables:
      auth_data:
        type: file
        file:
          path: /etc/vector-auth/tokens.csv
          encoding: { type: csv }
        schema:
          token_sha256: string
          tenant: string
          active: boolean
    {{- end }}

    sources:
      vector_in:
        type: vector
        address: 0.0.0.0:6000
        version: "2"
        acknowledgements:
          enabled: true
    #   tls:
    #     enabled: true
    #     crt_file: /etc/vector-tls/tls.crt
    #     key_file: /etc/vector-tls/tls.key
    #     ca_file: /etc/vector-tls/ca.crt
    #     verify_certificate: true
    {{- if .Values.vectorHttpIngest.enabled }}
      # Remote HTTP events from siphon: POST /ingest/<event.name> with body
      #   { observed_at, attributes: {"event.name", "aws.s3.bucket", ...}, body }
      http_in:
        type: http_server
        address: 0.0.0.0:8080
        path: /
        strict_path: false
        method: POST
        decoding:
          codec: json
        # Capture the authenticated header onto the event so the tenant transform
        # can derive .tenant from it
        headers:
          - authorization
        auth:
          strategy: custom
          # Whole Authorization header value is the opaque token
          source: |
            digest = sha2!(.headers.authorization, variant: "SHA-256")
            row = get_enrichment_table_record!("auth_data", { "token_sha256": digest })
            row.active == true
    {{- end }}

      internal_metrics:
        type: internal_metrics

    transforms:
      {{- if .Values.vectorHttpIngest.enabled }}
      # Derive tenant from the authenticated Authorization header
      # then drop the token so it never reaches a sink
      http_auth_tenant:
        type: remap
        inputs:
          - http_in
        source: |
          if exists(.authorization) {
            digest = sha2(string(.authorization) ?? "", variant: "SHA-256")
            row    = get_enrichment_table_record("auth_data", { "token_sha256": digest }) ?? {}
            .tenant = string(row.tenant) ?? "unknown"
            del(.authorization)
          }
      {{- end }}

      normalize:
        type: remap
        inputs:
          - vector_in
          {{- if .Values.vectorHttpIngest.enabled }}
          - http_auth_tenant
          {{- end }}
        source: |
          # Non-k8s sources: merge a JSON .message into the root as before. k8s
          # node logs are handled in parsed_kubernetes, which nests the parsed
          # payload under kube.<namespace> to avoid cross-namespace OpenSearch
          # mapping collisions -- so do NOT root-merge them here.
          if !exists(.kubernetes) && is_string(.message) {
            parsed, err = parse_json(.message)
            if err == null && is_object(parsed) {
              . = merge(., object!(parsed), deep: true)
            }
          }

      # Classify siphon-wrapped events. S3-sourced deliveries arrive as
      # attributes."event.name" == "aws.s3.object_received" and are
      # discriminated by the S3 key naming convention. Non-S3 sources
      # CloudWatch Logs via siphon carry their payload in .body
      # and are discriminated on body fields (e.g. .body.logGroup). Routes are
      # matched in order.
      {{- if $opensearch }}
      # Split forwarded events (from another aggregator's remoteForward) out of
      # the raw ingest stream so they bypass event_router/parsed_* entirely
      # (prevents double parsing). They carry .forwarded set by forward_prep.
      # Always present on a storing node so remote events are handled in parallel
      # with normal events; if none arrive the route simply never matches.
      ingress_class:
        type: route
        inputs:
          - normalize
        route:
          forwarded: '.forwarded == true'

      # Re-promote the lifted metadata: .event_type -> %event_type so sink_router
      # routes to the correct opensearch_<svc>. .index_suffix is kept (the sink's
      # bulk.index reuses it) and stripped before storage by the sink's
      # except_fields. Drop the helper fields that must never be stored.
      forwarded_promote:
        type: remap
        inputs:
          - ingress_class.forwarded
        source: |
          if exists(.event_type) {
            %event_type = string!(.event_type)
            del(.event_type)
          }
          del(.forwarded)
      {{- end }}

      event_router:
        type: route
        inputs:
          {{- if $opensearch }}
          - ingress_class._unmatched
          {{- else }}
          - normalize
          {{- end }}
        route:
          cloudtrail: |
            .attributes."event.name" == "aws.s3.object_received" &&
            contains(string(.attributes."aws.s3.key") ?? "", "/CloudTrail/")
          vpcflow: |
            .attributes."event.name" == "aws.s3.object_received" &&
            contains(string(.attributes."aws.s3.key") ?? "", "/vpcflowlogs/")
          cloudfront: |
            .attributes."event.name" == "aws.s3.object_received" &&
            match(string(.attributes."aws.s3.key") ?? "",
                  r'E[A-Z0-9]+\.\d{4}-\d{2}-\d{2}-\d{2}\.[A-Za-z0-9]+\.gz$')
          # S3 server access logs land in the target bucket with the key
          # convention `[<prefix>]YYYY-MM-DD-HH-MM-SS-<16-char-unique-id>`.
          s3-access-logs: |
            .attributes."event.name" == "aws.s3.object_received" &&
            match(string(.attributes."aws.s3.key") ?? "",
                  r'\d{4}-\d{2}-\d{2}-\d{2}-\d{2}-\d{2}-[A-Z0-9]{16}$')
          # CloudWatch Logs via siphon
          lambda: |
            starts_with(string(.body.logGroup) ?? "", "/aws/lambda/")
          # Node pod logs from the vector-agent DaemonSet. Only kubernetes_logs
          # events carry .kubernetes.pod_name; siphon/S3/CWL events never do.
          kubernetes: |
            exists(.kubernetes.pod_name)


      {{- if $opensearch }}
      sink_router:
        type: route
        inputs:
          - parsed_*
          - event_router._unmatched
          - forwarded_promote
        route:
          cloudtrail:     '%event_type == "aws.cloudtrail"'
          cloudfront:     '%event_type == "aws.cloudfront"'
          s3-access-logs: '%event_type == "aws.s3-access-logs"'
          lambda:         '%event_type == "aws.lambda"'
          kubernetes:     '%event_type == "kubernetes"'
      {{- end }}

      {{- if $rf }}
      # Forward path: %event_type is metadata and would be lost by JSON encoding,
      # so lift it to a field; mark the event (.forwarded) so the remote
      # detects-and-bypasses its parsers (prevents double parsing). .index_suffix
      # and .id are already fields on parsed events and ride along automatically
      # (remote reuses index_suffix for bulk.index, then strips it before
      # storage; .id gives cross-hop dedup).
      forward_prep:
        type: remap
        inputs:
          - parsed_*
          - event_router._unmatched
        source: |
          .forwarded = true
          if exists(%event_type) {
            .event_type = %event_type
          }
      {{- end }}

      # Drop metrics emitted BY the metrics plumbing itself
      metrics_clean:
        type: filter
        inputs: [internal_metrics]
        condition: '!includes(["internal_metrics", "metrics_clean"], string(.tags.component_id) ?? "")'

    sinks:
      {{- if $opensearch }}
      opensearch_cloudtrail:
        type: elasticsearch
        inputs:
          - sink_router.cloudtrail
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        # _id = CloudTrail eventID (top-level after flat-shape parser rewrite).
        id_key: eventID
        bulk:
          action: index
          # AWS CLO cloudtrail-* index pattern. index_suffix = %Y.%m.%d
          # derived from eventTime so backfills land in the correct daily index.
          index: 'cloudtrail-{{ "{{ index_suffix }}" }}'
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        # index_suffix is a bulk.index routing helper only
        encoding:
          except_fields: ["index_suffix"]
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        #buffer: { type: disk, max_size: 268435488, when_full: block }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }

      opensearch_cloudfront:
        type: elasticsearch
        inputs:
          - sink_router.cloudfront
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        # _id = CloudFront x-edge-request-id. Mirrored into .id by the parser
        # to keep this path hyphen-free.
        id_key: id
        bulk:
          action: index
          # AWS CLO cloudfront-* index pattern. index_suffix = %Y.%m.%d
          # derived from the log line's date/time fields.
          index: 'cloudfront-{{ "{{ index_suffix }}" }}'
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        # index_suffix is a bulk.index routing helper only
        encoding:
          except_fields: ["index_suffix"]
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }

      opensearch_s3-access-logs:
        type: elasticsearch
        inputs:
          - sink_router.s3-access-logs
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        # _id = S3 request_id (mirrored to .id by the parser).
        id_key: id
        bulk:
          action: index
          # AWS CLO s3-access-logs-* index pattern. index_suffix derived from
          # each log line's bracketed timestamp.
          index: 's3-access-logs-{{ "{{ index_suffix }}" }}'
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        # index_suffix is a bulk.index routing helper only
        encoding:
          except_fields: ["index_suffix"]
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }

      opensearch_lambda:
        type: elasticsearch
        inputs:
          - sink_router.lambda
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        # _id = CloudWatch logEvents[].id (mirrored to .id by the parser).
        id_key: id
        bulk:
          action: index
          # AWS CLO lambda-* index pattern. index_suffix derived from each log
          # event's epoch-millis timestamp.
          index: 'lambda-{{ "{{ index_suffix }}" }}'
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        # index_suffix is a bulk.index routing helper only
        encoding:
          except_fields: ["index_suffix"]
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }

      opensearch_kubernetes:
        type: elasticsearch
        inputs:
          - sink_router.kubernetes
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        # _id = synthetic sha256(file|ts_nanos|message) from parsed_kubernetes,
        # so a retried bulk re-indexes the same doc instead of duplicating it.
        id_key: id
        bulk:
          action: index
          # kubernetes-* index pattern; index_suffix = daily %Y.%m.%d derived
          # from each event's own log timestamp. flat_object mappings for
          # pod_labels et al. come from the kubernetes index template.
          index: 'kubernetes-{{ "{{ index_suffix }}" }}'
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        # index_suffix is a bulk.index routing helper only
        encoding:
          except_fields: ["index_suffix"]
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }

      opensearch_logs:
        type: elasticsearch
        inputs:
          - sink_router._unmatched
        endpoints: ["${OPENSEARCH_ENDPOINT}"]
        api_version: v7
        mode: bulk
        bulk: { index: "logs-%Y.%m.%d" }
        auth:
          strategy: basic
          user: "${OPENSEARCH_USER}"
          password: "${OPENSEARCH_PASSWORD}"
        tls:
          verify_certificate: false
        # index_suffix is a bulk.index routing helper only
        encoding:
          except_fields: ["index_suffix"]
        compression: gzip
        batch: { max_events: 2000, timeout_secs: 5 }
        buffer: { type: memory, max_events: 1000, when_full: block }
        healthcheck: { enabled: true }
        #buffer: { type: disk, max_size: 268435488, when_full: block }
      {{- end }}

      {{- if $rf }}
      # Forward all (prepped) events to the remote aggregator over HTTPS + bearer
      # token.
      remote_forward:
        type: http
        inputs:
          - forward_prep
        uri: {{ .Values.vector.remoteForward.uri | quote }}
        method: post
        encoding:
          codec: json
        auth:
          strategy: bearer
          token: "${VECTOR_REMOTE_TOKEN}"
        compression: gzip
        acknowledgements:
          enabled: true
        request:
          retry_attempts: {{ .Values.vector.remoteForward.request.retryAttempts }}
        buffer:
          type: disk
          max_size: {{ .Values.vector.remoteForward.buffer.maxSize }}
          when_full: {{ .Values.vector.remoteForward.buffer.whenFull }}
        healthcheck:
          enabled: false
      {{- end }}

      metrics:
        type: prometheus_exporter
        inputs: [metrics_clean]
        address: 0.0.0.0:9090
{{- end }}
