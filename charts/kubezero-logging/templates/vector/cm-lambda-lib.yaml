{{- if .Values.vector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-lambda-lib
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: Aggregator
data:
  remap_lambda.yaml: |
    transforms:
      # Explode a CWL DATA_MESSAGE into one event per logEvents[] entry; wrapper
      # fields (logGroup/logStream/owner) are stashed as metadata for parsed_lambda.
      lambda_unpack:
        type: remap
        inputs:
          - event_router.lambda
        source: |
          %event_type = "aws.lambda"

          # .body may arrive as a decoded object or as JSON text — handle both.
          body = .body
          if is_string(body) {
              body = parse_json(string!(body)) ?? {}
          }

          %log_group  = body.logGroup
          %log_stream = body.logStream
          %owner      = body.owner

          # AWS region rides on the siphon envelope as the `cloud.region`
          %region     = .attributes."cloud.region"

          # Drop CloudWatch CONTROL_MESSAGE keep-alives.
          if (string(body.messageType) ?? "") == "CONTROL_MESSAGE" {
              . = []
          } else {
              . = array(body.logEvents) ?? []
          }

      # Flat doc for the AWS CLO lambda template; `time` is epoch-ms (CLO aliases
      # @timestamp to it).
      parsed_lambda:
        type: remap
        inputs:
          - lambda_unpack
        source: |
          ev = .
          ms = to_int(ev.timestamp) ?? 0

          . = {
              "time":       ms,
              "log_group":  %log_group,
              "log_stream": %log_stream,
              "owner":      %owner,
              "region":     %region,
              "log-detail": ev.message
          }

          # logEvents[].id is globally unique -> idempotent retries.
          .id = ev.id

          # Event-time (epoch-ms) for set_index_suffix; never stored.
          .index_ts = ms

          . = compact(., recursive: true, null: true)
{{- end }}
