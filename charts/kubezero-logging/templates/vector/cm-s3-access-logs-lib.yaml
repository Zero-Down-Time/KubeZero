{{- if .Values.vector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-s3-access-logs-lib
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: Aggregator
data:
  remap_s3-access-logs.yaml: |
    transforms:
      # One event per S3 server-access-log line (plain text, no header rows).
      s3-access-logs_unpack:
        type: remap
        inputs:
          - event_router.s3-access-logs
        source: |
          %event_type = "aws.s3-access-logs"

          raw   = to_string(.body) ?? ""
          lines = split(raw, "\n")
          data  = filter(lines) -> |_idx, line| { line != "" }
          . = map_values(data) -> |line| { { "_line": line } }

      # Flat shape for the AWS CLO s3-access-logs template. Quoted segments
      # (request_uri/referrer/user_agent) are captured whole as they contain spaces.
      parsed_s3-access-logs:
        type: remap
        inputs:
          - s3-access-logs_unpack
        source: |
          line = string!(._line)

          pattern = r'^(?P<bucket_owner>\S+) (?P<bucket>\S+) \[(?P<time>[^\]]+)\] (?P<remote_ip>\S+) (?P<requester>\S+) (?P<request_id>\S+) (?P<operation>\S+) (?P<key>\S+) "(?P<request_uri>[^"]*)" (?P<http_status>\S+) (?P<error_code>\S+) (?P<bytes_sent>\S+) (?P<object_size>\S+) (?P<total_time>\S+) (?P<turn_around_time>\S+) "(?P<referrer>[^"]*)" "(?P<user_agent>[^"]*)" (?P<version_id>\S+) (?P<host_id>\S+) (?P<signature_version>\S+) (?P<cipher_suite>\S+) (?P<authentication_type>\S+) (?P<host_header>\S+) (?P<tls_version>\S+)'

          c, err = parse_regex(line, pattern)
          if err != null {
              abort
          }

          # Event-time for .index_ts below; CLO indexes the raw bracket string itself.
          ts = parse_timestamp(c.time, "%d/%b/%Y:%H:%M:%S %z") ?? now()

          . = {
              "timestamp":           c.time,
              "bucket_owner":        c.bucket_owner,
              "bucket":              c.bucket,
              "remote_ip":           c.remote_ip,
              "requester":           c.requester,
              "request_id":          c.request_id,
              "operation":           c.operation,
              "key":                 c.key,
              "request_uri":         c.request_uri,
              "http_status":         c.http_status,
              "error_code":          c.error_code,
              "bytes_sent":          to_int(c.bytes_sent)       ?? null,
              "object_size":         to_int(c.object_size)      ?? null,
              "total_time":          to_int(c.total_time)       ?? null,
              "turn_around_time":    to_int(c.turn_around_time) ?? null,
              "referrer":            c.referrer,
              "user_agent":          c.user_agent,
              "version_id":          c.version_id,
              "host_id":             c.host_id,
              "signature_version":   c.signature_version,
              "cipher_suite":        c.cipher_suite,
              "authentication_type": c.authentication_type,
              "host_header":         c.host_header,
              "tls_version":         c.tls_version
          }

          # .id mirrors request_id for id_key dedup.
          .id = c.request_id

          # Event-time (epoch-ms) for set_index_suffix; never stored.
          .index_ts = to_unix_timestamp(ts, unit: "milliseconds")
{{- end }}
