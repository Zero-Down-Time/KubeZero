{{- if and .Values.secretConfig (not .Values.existingSecret) }}
# Keyed apprise configs (stateful "simple" mode). Each data key is a filename
# <key>.cfg (TEXT) or <key>.yml (YAML), mounted directly at /config/<key>.
apiVersion: v1
kind: Secret
metadata:
  name: eventhub
  labels:
    app: eventhub
    {{- include "kubezero-lib.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- toYaml .Values.secretConfig | nindent 2 }}
{{- end }}
