{{- if .Values.networkPolicy.enabled }}
# Default-deny ingress to the apprise-api pods, allowing only the configured
# sources to reach :8000. Egress is left unrestricted.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eventhub
  labels:
    app: eventhub
    {{- include "kubezero-lib.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: eventhub
  policyTypes: [Ingress]
  ingress:
  - from:
      {{- toYaml .Values.networkPolicy.from | nindent 4 }}
    ports:
    - port: 8000
      protocol: TCP
{{- end }}
