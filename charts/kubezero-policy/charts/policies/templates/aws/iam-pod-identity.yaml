{{- if .Values.aws.enabled }}
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: add-aws-iam-pod-identity
  annotations:
    policies.kyverno.io/title: AWS Pod Identity
    policies.kyverno.io/category: aws
    policies.kyverno.io/minversion: 1.18.0
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      This provides the EKS Pod Identity Webhook functionality for KubeZero.
      Pods having a service account annotated with \"kubezero.com/aws-iam-role-arn\"
      will get the required environment variables as well as volumes injected
      to make the SDKs automatically find and use the IAM role.
spec:
  evaluation:
    background:
      enabled: false
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        operations:
          - CREATE
  matchConditions:
    - name: has-service-account
      expression: "has(object.spec.serviceAccountName) && object.spec.serviceAccountName != ''"
  variables:
    - name: annotations
      expression: >-
        resource.Get("v1", "serviceaccounts", request.namespace, object.spec.serviceAccountName).metadata.?annotations.orValue({})
    - name: roleArn
      expression: >-
        "kubezero.com/aws-iam-role-arn" in variables.annotations ? variables.annotations["kubezero.com/aws-iam-role-arn"] : ""
    - name: region
      expression: '"{{ .Values.aws.region }}"'
    - name: tokenFile
      expression: '"/var/run/secrets/sts.amazonaws.com/serviceaccount/token"'
    - name: mountPath
      expression: '"/var/run/secrets/sts.amazonaws.com/serviceaccount/"'
    - name: audience
      expression: '"sts.amazonaws.com"'
    - name: awsTokenVolume
      expression: >-
        {"name": dyn("aws-token"), "projected": dyn({"sources": [{"serviceAccountToken": {"path": dyn("token"), "expirationSeconds": dyn(86400), "audience": dyn(variables.audience)}}]})}
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: >-
          variables.roleArn == "" ? Object{} : Object{
            spec: Object.spec{
              containers: object.spec.containers.map(c, Object.spec.containers{
                name: c.name,
                env: [
                  Object.spec.containers.env{name: "AWS_REGION", value: variables.region},
                  Object.spec.containers.env{name: "AWS_ROLE_ARN", value: variables.roleArn},
                  Object.spec.containers.env{name: "AWS_WEB_IDENTITY_TOKEN_FILE", value: variables.tokenFile},
                  Object.spec.containers.env{name: "AWS_STS_REGIONAL_ENDPOINTS", value: "regional"}
                ],
                volumeMounts: [
                  Object.spec.containers.volumeMounts{name: "aws-token", mountPath: variables.mountPath, readOnly: true}
                ]
              }),
              initContainers: (has(object.spec.initContainers) ? object.spec.initContainers : []).map(c, Object.spec.initContainers{
                name: c.name,
                env: [
                  Object.spec.initContainers.env{name: "AWS_REGION", value: variables.region},
                  Object.spec.initContainers.env{name: "AWS_ROLE_ARN", value: variables.roleArn},
                  Object.spec.initContainers.env{name: "AWS_WEB_IDENTITY_TOKEN_FILE", value: variables.tokenFile},
                  Object.spec.initContainers.env{name: "AWS_STS_REGIONAL_ENDPOINTS", value: "regional"}
                ],
                volumeMounts: [
                  Object.spec.initContainers.volumeMounts{name: "aws-token", mountPath: variables.mountPath, readOnly: true}
                ]
              }),
              ephemeralContainers: (has(object.spec.ephemeralContainers) ? object.spec.ephemeralContainers : []).map(c, Object.spec.ephemeralContainers{
                name: c.name,
                env: [
                  Object.spec.ephemeralContainers.env{name: "AWS_REGION", value: variables.region},
                  Object.spec.ephemeralContainers.env{name: "AWS_ROLE_ARN", value: variables.roleArn},
                  Object.spec.ephemeralContainers.env{name: "AWS_WEB_IDENTITY_TOKEN_FILE", value: variables.tokenFile},
                  Object.spec.ephemeralContainers.env{name: "AWS_STS_REGIONAL_ENDPOINTS", value: "regional"}
                ],
                volumeMounts: [
                  Object.spec.ephemeralContainers.volumeMounts{name: "aws-token", mountPath: variables.mountPath, readOnly: true}
                ]
              })
            }
          }
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          (variables.roleArn == "" || (has(object.spec.volumes) && object.spec.volumes.exists(v, v.name == "aws-token"))) ? [] :
          has(object.spec.volumes)
            ? [JSONPatch{op: "add", path: "/spec/volumes/-", value: variables.awsTokenVolume}]
            : [JSONPatch{op: "add", path: "/spec/volumes", value: [variables.awsTokenVolume]}]
{{- end }}
