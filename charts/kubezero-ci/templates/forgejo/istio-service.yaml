{{- if and .Values.forgejo.enabled .Values.forgejo.istio.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: forgejo
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubezero-lib.labels" $ | nindent 4 }}
spec:
  gateways:
  - {{ .Values.forgejo.istio.gateway }}
  hosts:
  - {{ .Values.forgejo.istio.url }}
  http:
  - match:
    - headers:
        user-agent:
          regex: '(?i).*(?:AI2Bot|AI2Bot-DeepResearchEval|AddSearchBot|AgentTimes|Ai2Bot-Dolma|AmazonBuyForMe|Amazonbot|Amzn-SearchBot|Amzn-User|Andibot|Anomura|ApifyBot|ApifyWebsiteContentCrawler|Applebot|Applebot-Extended|Aranet-SearchBot|Awario|AzureAI-SearchBot|Bravebot|Brightbot|Brightbot 1\.0|BuddyBot|Bytespider|CCBot|Channel3Bot|ChatGLM-Spider|ChatGPT Agent|ChatGPT-User|Claude-Code|Claude-SearchBot|Claude-User|Claude-Web|ClaudeBot|CloudVertexBot|Cloudflare-AutoRAG|Code|Cotoyogi|CragCrawler|Crawl4AI|Crawlspace|Datenbank Crawler|DeepSeekBot|Devin|Diffbot|DuckAssistBot|Echobot Bot|EchoboxBot|ExaBot|FacebookBot|Factset_spyderbot|FirecrawlAgent|FriendlyCrawler|GPTBot|GeistHaus-PageFetcher|Gemini-Deep-Research|Google-Agent|Google-CloudVertexBot|Google-Extended|Google-Firebase|Google-Gemini-CLI|Google-NotebookLM|GoogleAgent-Mariner|GoogleAgent-URLContext|GoogleOther|GoogleOther-Image|GoogleOther-Video|HenkBot|ICC-Crawler|ISSCyberRiskCrawler).*'
    - headers:
        user-agent:
          regex: '(?i).*(?:IbouBot|ImagesiftBot|Kangaroo Bot|Kimi-User|KlaviyoAIBot|KunatoCrawler|LAIONDownloader|LCC|LinerBot|Linguee Bot|LinkupBot|Manus-User|Meta-ExternalAgent|Meta-ExternalFetcher|MistralAI-User|MistralAI-User/1\.0|MyCentralAIScraperBot|NagetBot|NotebookLM|NovaAct|OAI-SearchBot|OpenAI|Operator|PanguBot|Panscient|Perplexity-User|PerplexityBot|PetalBot|PhindBot|Poggio-Citations|Poseidon Research Crawler|QualifiedBot|Querit-SearchBot|QueritBot|QuillBot|SBIntuitionsBot|Scrapy|SemrushBot-OCOB|SemrushBot-SWA|Shap-User|ShapBot|Sidetrade indexer bot|Spider|TavilyBot|Terra Cotta|TerraCotta|Thinkbot|TikTokSpider|Timpibot|Trae|TwinAgent|UseAI|VelenPublicWebCrawler|WARDBot|WRTNBot|Webzio-Extended|YaK|YandexAdditional|YandexAdditionalBot|YouBot|ZanistaBot|aiHitBot|amazon-kendra|anthropic-ai|atlassian-bot|bedrockbot|bigsur\.ai|cohere-ai|cohere-training-data-crawler|facebookexternalhit|iAskBot|iaskspider|iaskspider/2\.0|imageSpider).*'
    - headers:
        user-agent:
          regex: '(?i).*(?:img2dataset|kagi-fetcher|laion-huggingface-processor|meta-externalagent|meta-externalfetcher|meta-webindexer|netEstate Imprint Crawler|newsai|omgili|omgilibot|opencode|panscient\.com|quillbot\.com|webzio-extended|wpbot).*'
    directResponse:
      status: 418
  {{- if .Values.forgejo.istio.branding.enabled }}
  - match:
    - uri:
        exact: /assets/img/logo.svg
    - uri:
        exact: /assets/img/favicon.svg
    redirect:
      authority: cdn.zero-downtime.net
      uri: /assets/zdt/logo.svg
  - match:
    - uri:
        exact: /assets/img/favicon.png
    redirect:
      authority: cdn.zero-downtime.net
      uri: /assets/zdt/logo-small-64.png
  {{- end }}
  - name: api
    match:
    - uri:
       prefix: /api/
    route:
    - destination:
        host: {{ ternary "forgejo-anubis" "forgejo-http" .Values.forgejo.anubis.enabled }}
        port:
          number: {{ ternary "8080" "3000" .Values.forgejo.anubis.enabled }}
  - name: notApi
    route:
    - destination:
        host: {{ ternary "forgejo-anubis" "forgejo-http" .Values.forgejo.anubis.enabled }}
        port:
          number: {{ ternary "8080" "3000" .Values.forgejo.anubis.enabled }}
  tcp:
  - match:
    - port: 22
    route:
    - destination:
        host: forgejo-ssh
{{- end }}
