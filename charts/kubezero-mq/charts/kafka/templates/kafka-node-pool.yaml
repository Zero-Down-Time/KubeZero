apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: default-nodes
  labels:
    strimzi.io/cluster: {{ .Values.cluster.name }}
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: {{ .Values.storage.size }}
        deleteClaim: false
        kraftMetadata: shared
  {{- with .Values.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.jvmOptions }}
  jvmOptions:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    pod:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                strimzi.io/cluster: {{ .Values.cluster.name }}
                strimzi.io/pool-name: default-nodes
            topologyKey: "kubernetes.io/hostname"

